<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="Segoe UI, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="a3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="860" height="500" fill="#f8fafc"/>
  <text x="430" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Self-Healing Flow</text>
  <text x="430" y="50" text-anchor="middle" font-size="12" fill="#475569">activated only when a deterministic locator fails</text>

  <!-- uat.click call -->
  <rect x="330" y="75" width="200" height="50" rx="10" fill="#e0e7ff" stroke="#4338ca"/>
  <text x="430" y="97" text-anchor="middle" font-weight="600">uat.click(page, "Save")</text>
  <text x="430" y="114" text-anchor="middle" font-size="11">from _uat.ts</text>

  <!-- decision -->
  <polygon points="430,160 540,200 430,240 320,200" fill="#fef9c3" stroke="#a16207"/>
  <text x="430" y="200" text-anchor="middle" font-weight="600">locator found?</text>

  <line x1="430" y1="125" x2="430" y2="160" stroke="#0f172a" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- success -->
  <rect x="560" y="180" width="220" height="40" rx="8" fill="#dcfce7" stroke="#15803d"/>
  <text x="670" y="205" text-anchor="middle" fill="#14532d" font-weight="600">YES → perform action, continue</text>
  <line x1="540" y1="200" x2="560" y2="200" stroke="#0f172a" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- failure -->
  <rect x="330" y="260" width="200" height="40" rx="8" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="430" y="284" text-anchor="middle" fill="#7f1d1d" font-weight="600">NO → self-healing enabled?</text>
  <line x1="430" y1="240" x2="430" y2="260" stroke="#0f172a" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- not enabled path -->
  <rect x="80" y="260" width="200" height="40" rx="8" fill="#fff" stroke="#475569"/>
  <text x="180" y="284" text-anchor="middle">disabled → test fails</text>
  <line x1="330" y1="280" x2="280" y2="280" stroke="#0f172a" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- enabled path -->
  <rect x="330" y="330" width="200" height="44" rx="8" fill="#fff" stroke="#b91c1c"/>
  <text x="430" y="356" text-anchor="middle">screenshot current page</text>
  <line x1="430" y1="300" x2="430" y2="330" stroke="#0f172a" stroke-width="1.5" marker-end="url(#a3)"/>

  <rect x="330" y="390" width="200" height="44" rx="8" fill="#ede9fe" stroke="#6d28d9"/>
  <text x="430" y="410" text-anchor="middle">send to vision model</text>
  <text x="430" y="426" text-anchor="middle" font-size="11">"where is the Save button?"</text>
  <line x1="430" y1="374" x2="430" y2="390" stroke="#0f172a" stroke-width="1.5" marker-end="url(#a3)"/>

  <rect x="330" y="450" width="200" height="40" rx="8" fill="#fff" stroke="#6d28d9"/>
  <text x="430" y="475" text-anchor="middle">retry once · decrement cap</text>
  <line x1="430" y1="434" x2="430" y2="450" stroke="#0f172a" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- cap reached -->
  <rect x="580" y="330" width="220" height="104" rx="10" fill="#fff7ed" stroke="#c2410c"/>
  <text x="690" y="354" text-anchor="middle" font-weight="600" fill="#9a3412">Safety</text>
  <text x="690" y="374" text-anchor="middle" font-size="11">cap = maxFallbacksPerRun</text>
  <text x="690" y="392" text-anchor="middle" font-size="11">default 6 · configurable</text>
  <text x="690" y="412" text-anchor="middle" font-size="11">when exhausted → fail</text>
  <text x="690" y="426" text-anchor="middle" font-size="11">AI keys injected via env</text>

  <!-- annotations -->
  <text x="40" y="100" font-size="11" fill="#475569">Triggered only in
uat.click / uat.fill</text>
</svg>
