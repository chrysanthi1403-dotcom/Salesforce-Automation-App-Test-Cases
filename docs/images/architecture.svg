<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <linearGradient id="gElectron" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/><stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="gRenderer" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ede9fe"/><stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="gExt" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/><stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="gStore" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/><stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
  </defs>

  <rect width="960" height="640" fill="#f8fafc"/>
  <text x="480" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">
    Salesforce UAT Auto Runner — Architecture
  </text>

  <!-- Renderer -->
  <rect x="30" y="60" width="260" height="220" rx="10" fill="url(#gRenderer)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="160" y="82" text-anchor="middle" font-weight="700" fill="#4c1d95">Renderer (React + Vite)</text>
  <rect x="50" y="100" width="100" height="30" rx="6" fill="#fff" stroke="#7c3aed"/>
  <text x="100" y="120" text-anchor="middle">Home / NewRun</text>
  <rect x="170" y="100" width="100" height="30" rx="6" fill="#fff" stroke="#7c3aed"/>
  <text x="220" y="120" text-anchor="middle">Orgs / Settings</text>
  <rect x="50" y="140" width="100" height="30" rx="6" fill="#fff" stroke="#7c3aed"/>
  <text x="100" y="160" text-anchor="middle">Pipeline</text>
  <rect x="170" y="140" width="100" height="30" rx="6" fill="#fff" stroke="#7c3aed"/>
  <text x="220" y="160" text-anchor="middle">OutputFolder</text>
  <rect x="50" y="180" width="100" height="30" rx="6" fill="#fff" stroke="#7c3aed"/>
  <text x="100" y="200" text-anchor="middle">History</text>
  <rect x="170" y="180" width="100" height="30" rx="6" fill="#fff" stroke="#7c3aed"/>
  <text x="220" y="200" text-anchor="middle">RunDetail</text>
  <text x="160" y="240" text-anchor="middle" fill="#4c1d95" font-style="italic">Zustand + shadcn/ui</text>
  <text x="160" y="258" text-anchor="middle" fill="#4c1d95" font-style="italic">contextIsolation: true</text>

  <!-- Main Process -->
  <rect x="340" y="60" width="300" height="520" rx="10" fill="url(#gElectron)" stroke="#0284c7" stroke-width="1.5"/>
  <text x="490" y="82" text-anchor="middle" font-weight="700" fill="#075985">Electron Main Process</text>

  <rect x="360" y="100" width="260" height="36" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="490" y="123" text-anchor="middle" font-weight="600">ipc.ts · preload bridge</text>

  <rect x="360" y="150" width="260" height="36" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="490" y="173" text-anchor="middle">pipeline.ts · orchestrator</text>

  <rect x="360" y="200" width="125" height="36" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="422" y="223" text-anchor="middle">excel.ts</text>
  <rect x="495" y="200" width="125" height="36" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="558" y="223" text-anchor="middle">normalizer.ts</text>

  <rect x="360" y="250" width="125" height="36" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="422" y="273" text-anchor="middle">salesforce.ts</text>
  <rect x="495" y="250" width="125" height="36" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="558" y="273" text-anchor="middle">generator.ts</text>

  <rect x="360" y="300" width="125" height="36" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="422" y="323" text-anchor="middle">runner.ts</text>
  <rect x="495" y="300" width="125" height="36" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="558" y="323" text-anchor="middle">calibration.ts</text>

  <rect x="360" y="350" width="260" height="60" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="490" y="370" text-anchor="middle" font-weight="600">ai/ · LLMProvider abstraction</text>
  <text x="490" y="390" text-anchor="middle" font-size="11">anthropic · openai · gemini · vision</text>

  <rect x="360" y="425" width="125" height="36" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="422" y="448" text-anchor="middle">history.ts</text>
  <rect x="495" y="425" width="125" height="36" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="558" y="448" text-anchor="middle">secrets.ts</text>

  <rect x="360" y="475" width="260" height="36" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="490" y="498" text-anchor="middle">healing/helperTemplate.ts (_uat.ts)</text>

  <rect x="360" y="525" width="260" height="36" rx="6" fill="#fff" stroke="#0284c7"/>
  <text x="490" y="548" text-anchor="middle">browsers.ts · paths.ts · settings.ts</text>

  <!-- External -->
  <rect x="690" y="60" width="240" height="130" rx="10" fill="url(#gExt)" stroke="#d97706" stroke-width="1.5"/>
  <text x="810" y="82" text-anchor="middle" font-weight="700" fill="#92400e">External Services</text>
  <rect x="710" y="100" width="200" height="26" rx="5" fill="#fff" stroke="#d97706"/>
  <text x="810" y="118" text-anchor="middle">Anthropic · OpenAI · Gemini</text>
  <rect x="710" y="132" width="200" height="26" rx="5" fill="#fff" stroke="#d97706"/>
  <text x="810" y="150" text-anchor="middle">Salesforce Org (jsforce)</text>
  <rect x="710" y="164" width="200" height="20" rx="5" fill="#fff" stroke="#d97706"/>
  <text x="810" y="178" text-anchor="middle" font-size="11">REST / Metadata API</text>

  <!-- Playwright -->
  <rect x="690" y="210" width="240" height="130" rx="10" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="810" y="232" text-anchor="middle" font-weight="700" fill="#3730a3">Playwright Child Process</text>
  <rect x="710" y="250" width="200" height="26" rx="5" fill="#fff" stroke="#4338ca"/>
  <text x="810" y="268" text-anchor="middle">Chromium (headed)</text>
  <rect x="710" y="282" width="200" height="26" rx="5" fill="#fff" stroke="#4338ca"/>
  <text x="810" y="300" text-anchor="middle">generated/*.spec.ts</text>
  <rect x="710" y="314" width="200" height="20" rx="5" fill="#fff" stroke="#4338ca"/>
  <text x="810" y="328" text-anchor="middle" font-size="11">env: SF_* · AI_*</text>

  <!-- Local Storage -->
  <rect x="690" y="360" width="240" height="220" rx="10" fill="url(#gStore)" stroke="#15803d" stroke-width="1.5"/>
  <text x="810" y="382" text-anchor="middle" font-weight="700" fill="#166534">Local Storage (userData)</text>
  <rect x="710" y="400" width="200" height="26" rx="5" fill="#fff" stroke="#15803d"/>
  <text x="810" y="418" text-anchor="middle">sf-uat.sqlite (history)</text>
  <rect x="710" y="432" width="200" height="26" rx="5" fill="#fff" stroke="#15803d"/>
  <text x="810" y="450" text-anchor="middle">generated/&lt;org&gt;/&lt;importId&gt;</text>
  <rect x="710" y="464" width="200" height="26" rx="5" fill="#fff" stroke="#15803d"/>
  <text x="810" y="482" text-anchor="middle">evidence/&lt;runId&gt;</text>
  <rect x="710" y="496" width="200" height="26" rx="5" fill="#fff" stroke="#15803d"/>
  <text x="810" y="514" text-anchor="middle">calibrations/&lt;orgId&gt;.json</text>
  <rect x="710" y="528" width="200" height="26" rx="5" fill="#fff" stroke="#15803d"/>
  <text x="810" y="546" text-anchor="middle">ms-playwright/ (Chromium)</text>
  <rect x="710" y="560" width="200" height="14" rx="5" fill="#fff" stroke="#15803d"/>
  <text x="810" y="572" text-anchor="middle" font-size="10">OS Keychain via keytar</text>

  <!-- Arrows -->
  <line x1="290" y1="170" x2="340" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="315" y="162" text-anchor="middle" font-size="10" fill="#475569">IPC</text>

  <line x1="620" y1="380" x2="690" y2="380" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="655" y="372" text-anchor="middle" font-size="10" fill="#475569">HTTPS</text>

  <line x1="620" y1="270" x2="690" y2="270" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="655" y="262" text-anchor="middle" font-size="10" fill="#475569">spawn</text>

  <line x1="620" y1="443" x2="690" y2="443" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="655" y="435" text-anchor="middle" font-size="10" fill="#475569">fs / sqlite</text>
</svg>
